<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Lab01(library)</title>
        <meta name="library" content="library pproject">
        <meta name="author" content="https://github.com/kali4nya">
        <meta http-equiv="X-Ua-Compatible" content="IE=edge,chrome=1">
        <!-- Set Favicon -->
        <link rel="icon" href="favicon.png" type="image/x-icon">
        <!-- css-->
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
        <!-- fonts -->
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap');
        </style>
    </head>
    <body>
        <h1>Welcome to the library(Lab01)</h1>

        <form action="{{ url_for('create_book') }}" method="POST">
            <label for="title">Book Title:</label>
            <input type="text" id="title" name="title" required><br><br>
        
            <label for="author">Author:</label>
            <input type="text" id="author" name="author" required><br><br>
        
            <label for="release_year">Release Year:</label>
            <input type="number" id="release_year" name="release_year" required><br><br>
        
            <button type="submit">Add Book</button>
        </form>

        <h2>Book List</h2>
        <ul>
            {% for book in books %}
                <li>{{ book.title }} <b>by</b> {{ book.author }} ({{ book.release_year }}) - 
                    {% if book.available %}
                        Available
                    {% else %}
                        Not Available
                    {% endif %}
                </li>
            {% endfor %}
        </ul>

        <script src="{{ url_for('static', filename='script.js') }}"></script>
    </body>
</html>
